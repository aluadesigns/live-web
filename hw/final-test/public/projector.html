<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proximity — Projector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #fff;
    overflow: hidden;
    cursor: none;
    font-family: "Arial Narrow", Arial, sans-serif;
  }
  #stage, #peer-video {
    position: fixed; inset: 0;
    width: 100%; height: 100%; display: block;
  }
  #stage { z-index: 1; }
  #peer-video {
    object-fit: cover;
    background: transparent;
    opacity: 0;
    pointer-events: none;
    transform: scaleX(-1);
    z-index: 2;
  }
  /* Overlay states */
  .overlay {
    position: fixed; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2.5rem;
    z-index: 5;
    background: #fff;
    color: #1a1a1a;
    padding: 4rem;
    text-align: center;
  }
  .overlay.active { display: flex; }
  .overlay canvas {
    width: 280px; height: 280px;
    display: block;
  }
  .overlay .label {
    font-size: 2rem;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    line-height: 1.5;
  }
  .overlay.small canvas {
    width: 200px; height: 200px;
  }
  .overlay.small .label {
    font-size: 1.4rem;
  }
</style>
</head>
<body>

<canvas id="stage"></canvas>
<video id="peer-video" playsinline autoplay muted></video>

<div id="overlay-empty" class="overlay">
  <canvas id="qr-empty" width="280" height="280"></canvas>
  <div class="label">unmute your phone and scan me</div>
</div>

<div id="overlay-waiting" class="overlay">
  <div class="label">waiting for someone<br>on the other side</div>
</div>

<div id="overlay-peer-waiting" class="overlay small">
  <canvas id="qr-peer" width="200" height="200"></canvas>
  <div class="label">someone is waiting<br>for you on the other side</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/vendor/qrcode.min.js"></script>
<script src="/js/net.js"></script>
<script src="/js/projector.js"></script>
</body>
</html>
