<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proximity — Projector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #fff;
    overflow: hidden;
    cursor: none;
  }
  canvas, video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #peer-video {
    object-fit: cover;
    background: transparent;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s linear;
    transform: scaleX(-1);
  }
  #stage {
    z-index: 1;
  }
  #peer-video {
    z-index: 2;
  }
</style>
</head>
<body>

<canvas id="stage"></canvas>
<video id="peer-video" playsinline autoplay muted></video>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/net.js"></script>
<script src="/js/projector.js"></script>
</body>
</html>
